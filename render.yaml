databases:
  - name: game-sim-db
    plan: free
    databaseName: game_sim
    user: game_sim_user

services:
  - type: web
    name: game-sim
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: DATABASE_URL
        fromDatabase:
          name: game-sim-db
          property: connectionString
