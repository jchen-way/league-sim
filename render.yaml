services:
  - type: web
    name: game-sim
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
    disk:
      name: game-sim-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
